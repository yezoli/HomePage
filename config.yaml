params:
  author: "Zonglin Ye"
  author_bio: "Ph.D candidate in UESTC. Interested in Mixed-Signal IC design."
  since: "2026"
  icp: "网ICP备2023114514号"
  avatar: "/images/profile.png"
  favicon: "/images/favicon.ico"  # Please use .ico format
  menu: # The navigation bar
    Index:
        name: "Index"
        url: /
        weight: 1
    About:
        name: "About"
        url: b/
        weight: 3
    Publications:
        name: "Publications"
        url: "/#Publications"
        weight: 2
    Blog:
        name: "Blog Posts"
        url: "https://blog.csdn.net/qq_42761840"
        weight: 4

  # The default avatar if params.avatar not set.
  loading_bg:
