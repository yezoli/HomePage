        icon: "fab fa-orcid"
        weight: 2
      IEEE:
        name: IEEE Homepage
        url: "https://ieeexplore.ieee.org/author/37089336840"
        icon: "fas fa-circle-user"
        weight: 3

  # CV download link
  cv_dl:
    enable: true
    dir: /attaches/Ye_s_Resume_Chinese_Update.pdf
    description: Ye's CV

  # Box-shadow
  # display box-shadow on page or not
  box_shadow:
    enable: false

  # CDN
