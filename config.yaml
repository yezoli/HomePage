  e_social:
    enable: true
    links:
      Google Scholar:
        name: Google Scholar
        url:  "https://scholar.google.com/citations?user=pXL7b0AAAAAJ"
        icon: "fas fa-graduation-cap"
        weight: 1
      ORCID:
        name: ORCID
