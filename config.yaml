  # Find icons here : https://fontawesome.com/icons/
  # 可以通过 weight 调整显示顺序
  # 图标调用 font-awesome 5.13
  social:
    enable: true
    links:
      Github: 
        icon: fab fa-github
        url: https://gitee.com/yezoli
        weight: 1
      # Telegram:
      #   icon: fab fa-telegram
      #   url: https://t.me/zzsqwq
      #   weight: 2
      Envelope: #E-mail
        icon: fas fa-envelope
        url: mailto:yezoli@foxmail.com
        weight: 3
      # RSS:
      #   icon: fas fa-rss
      #   url: "index.xml/"
      #   weight: 4
      # Weixin: 
